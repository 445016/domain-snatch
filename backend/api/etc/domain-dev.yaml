# 开发环境示例（APP_ENV=dev 时自动加载；或 -f etc/domain-dev.yaml）
Name: domain
Host: 0.0.0.0
Port: 8888
Timeout: 120000
Log:
  ServiceName: domain
  Mode: file
  Path: logs
  Level: debug
  Compress: false
  KeepDays: 3
  StackCooldownMillis: 100

Auth:
  AccessSecret: "dev-secret-change-in-prod"
  AccessExpire: 86400

Mysql:
  DataSource: "root:123456@tcp(127.0.0.1:3306)/domain_snatch?charset=utf8mb4&parseTime=true&loc=Local&innodb_lock_wait_timeout=2&maxAllowedPacket=0"

Cache:
  - Host: "127.0.0.1:6379"

Aliyun:
  AccessKeyID: ""
  AccessKeySecret: ""
  Enabled: false

GoDaddy:
  APIKey: ""
  APISecret: ""
  Sandbox: true
  Enabled: false

AutoSnatch:
  Enabled: false
  MaxRetries: 3
  CheckIntervals:
    Registered: 86400
    Expired: 14400
    GracePeriod: 14400
    Redemption: 3600
    PendingDelete: 300
  Contact:
    FirstName: ""
    LastName: ""
    Email: ""
    Phone: ""
    Organization: ""
    Address1: ""
    City: ""
    State: ""
    PostalCode: ""
    Country: ""
