# 默认配置。设置 APP_ENV 可加载 domain-{APP_ENV}.yaml（如 APP_ENV=prod 加载 domain-prod.yaml）
Name: domain
Host: 0.0.0.0
Port: 8888
Timeout: 120000
Log:
  ServiceName: domain
  Mode: file
  Path: logs   # 运行时统一解析为 backend/logs（与 etc 同级）
  Level: info
  Compress: true
  KeepDays: 7
  StackCooldownMillis: 100

Auth:
  AccessSecret: "domain-snatch-secret-key-2026"
  AccessExpire: 86400

Mysql:
  DataSource: "root:123456@tcp(127.0.0.1:3306)/domain_snatch?charset=utf8mb4&parseTime=true&loc=Local&innodb_lock_wait_timeout=2&maxAllowedPacket=0"

Cache:
  - Host: "127.0.0.1:6379"

Aliyun:
  AccessKeyID: "YOUR_ACCESS_KEY_ID"
  AccessKeySecret: "YOUR_ACCESS_KEY_SECRET"
  Enabled: false

# GoDaddy API 配置（用于域名抢注）
GoDaddy:
  APIKey: "3mM44YwfEH95Wq_GhgRhMXawE79QfbeVkPWgz"
  APISecret: "TJuEoEjjr2GVBe2ZnxE3k8"
  Sandbox: true  # true=沙箱环境测试, false=生产环境
  Enabled: true

# 自动抢注配置
AutoSnatch:
  Enabled: false
  Platform: godaddy   # 抢注平台: godaddy / dropcatch（任务未填 target_registrar 时生效）
  MaxRetries: 3
  # 不同状态的检测间隔（秒）
  CheckIntervals:
    Registered: 86400      # 已注册: 每天检测
    Expired: 14400         # 已过期: 每4小时
    GracePeriod: 14400     # 宽限期: 每4小时
    Redemption: 3600       # 赎回期: 每1小时
    PendingDelete: 300     # 待删除: 每5分钟
  # 抢注联系人信息（GoDaddy API 需要）
  Contact:
    FirstName: "kevin"
    LastName: "zhaokun"
    Email: "follow_kevin@126.com"
    Phone: "+86.18910271624"
    Organization: "beijing software company"
    Address1: "beijing"
    City: "beijing"
    State: "beijing"
    PostalCode: "100000"
    Country: "CN"
