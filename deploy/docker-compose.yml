version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: domain-snatch-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: domain_snatch
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: domain-snatch-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: domain-snatch-backend
    restart: always
    ports:
      - "8888:8888"
    depends_on:
      - mysql
      - redis
    environment:
      - MYSQL_DSN=root:123456@tcp(mysql:3306)/domain_snatch?charset=utf8mb4&parseTime=true&loc=Local
      - REDIS_HOST=redis:6379

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: domain-snatch-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
